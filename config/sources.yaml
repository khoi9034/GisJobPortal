    notes: Local sample jobs for MVP development and demos.
  - name: USAJobs API
    type: api
    url: https://data.usajobs.gov/api/search
    enabled: true
    coverage_tier: government_api
    requires_api_key: true
    dedupe_priority: 95
    quality_score: 90
    default_date_posted_days: 30
    results_per_page: 10
    search_terms:
      - GIS Analyst
      - Geospatial Analyst
      - GIS Technician
      - Cartographer
      - Geographic Information Systems
      - Geography GIS
      - Spatial Analyst
      - Data Analyst GIS
      - Urban Planning GIS
      - Community Planner
      - Transportation Planning GIS
      - Recent Graduate GIS
      - Pathways GIS
    locations: []
    posted_date_supported: true
    close_date_supported: true
    updated_date_supported: false
    first_seen_only: false
    notes: Public federal jobs API; enable after setting USAJOBS_USER_AGENT and USAJOBS_API_KEY locally.
  - name: Adzuna Jobs API
    type: api
    provider: adzuna
    url: https://api.adzuna.com/v1/api/jobs/us/search/1
    enabled: false
    coverage_tier: broad_api
    requires_api_key: true
    required_env:
      - ADZUNA_APP_ID
      - ADZUNA_APP_KEY
    search_terms:
      - GIS Analyst
      - GIS Technician
      - Geospatial Analyst
      - Spatial Analyst
      - Urban Planning Analyst
      - Planning Technician
      - Transportation Planning Analyst
    locations:
