      - South Carolina
      - Virginia
      - Georgia
      - Remote
    title_keywords:
      - GIS
      - Geospatial
      - Spatial
      - Planning
      - Planner
      - Transportation
      - Data Analyst
    exclude_seniority_keywords:
      - Senior
      - Principal
      - Manager
      - Director
    min_score_by_source: 40
