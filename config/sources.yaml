  - name: Sample GIS Jobs
    type: manual
    url: data/sample_jobs.json
    enabled: true
    notes: Local sample jobs for MVP development and demos.
  - name: USAJobs API
    type: api
    url: https://data.usajobs.gov/api/search
    enabled: false
    results_per_page: 10
    search_terms:
      - GIS Analyst
      - GIS Technician
      - Geospatial Analyst
      - Urban Planning Analyst
      - Planning Technician
      - Spatial Analyst
      - Transportation Planning Analyst
    notes: Public federal jobs API; enable after setting USAJOBS_USER_AGENT and USAJOBS_API_KEY locally.
